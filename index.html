<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopPersonal - My Store</title>
    <!-- Link to your CSS stylesheet (optional but recommended) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Link to your JavaScript file. 
         'defer' ensures your script runs ONLY after the HTML loads. -->
    <script src="app.js" defer></script>
</head>
<body>

    <!-- 1. HEADER SECTION -->
    <header>
        <h1>Welcome to ShopPersonal</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="#cart">Cart</a>
        </nav>
    </header>

    <!-- 2. MAIN CONTENT AREA -->
    <main>
        <!-- Interactive Form Section -->
        <section id="search-section">
            <h2>Find Products</h2>
            <form id="contact-form">
                <input type="text" id="search-input" placeholder="Type a product name...">
                <button type="submit" id="submit-btn">Search</button>
            </form>
        </section>

        <!-- Dynamic Output Container (Where JavaScript inserts data) -->
        <section id="products-section">
            <h2>Our Collection</h2>
            <div class="output-container">
                <p>Loading products...</p>
            </div>
        </section>
    </main>

    <!-- 3. FOOTER SECTION -->
    <footer>
        <p>&copy; 2026 ShopPersonal. Hosted via GitHub Pages.</p>
    </footer>

</body>
</html>
